[project]
site_name = "Awesome Research Guides"
description = "Guidance about conducting scientific research."
site_url = "https://nkrusch.github.io/awesome-research-guides/"
repo_url = "https://github.com/nkrusch/awesome-research-guides"
site_author = "Neea Rusch"
version = "1.0.0"
docs_dir = "docs"
extra_css = ["style.css"]

[project.theme]
features = [
    "navigation.instant"
]
favicon = "./assets/icon.png"

[project.theme.icon]
logo = "lucide/waypoints"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

